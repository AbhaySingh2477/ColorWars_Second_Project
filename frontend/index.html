<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Wars - Dynamic</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💥</text></svg>">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            /* Black background with stars */
            background-color: #000000;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 160px 120px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 180px 180px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 250px 250px, rgba(255, 255, 255, 0.8), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 300px 100px, rgba(255, 255, 255, 0.8), rgba(0,0,0,0));
            background-size: 350px 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            box-sizing: border-box;
            color: #e0e0e0;
        }
        
        .game-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            background: rgba(10, 15, 25, 0.7);
            padding: clamp(10px, 3vw, 30px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(255, 215, 0, 0.1);
            position: relative;
            z-index: 10;
            box-sizing: border-box;
            display: none; /* Hidden until game starts */
            animation: fadeIn 0.5s ease;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        h1 {
            color: #4a4e69;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        
        .player {
            padding: 15px 25px;
            border-radius: 15px;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .player1 {
            background-color: transparent;
            color: #ff2a6d;
            border: 2px solid #ff2a6d;
            text-shadow: 0 0 5px #ff2a6d;
            box-shadow: inset 0 0 10px rgba(255,42,109,0.2);
        }
        
        .player2 {
            background-color: transparent;
            color: #05d9e8;
            border: 2px solid #05d9e8;
            text-shadow: 0 0 5px #05d9e8;
            box-shadow: inset 0 0 10px rgba(5,217,232,0.2);
        }
        
        .active-player {
            transform: scale(1.1);
            background-color: rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }
        
        .game-grid {
            display: grid;
            gap: clamp(4px, 1.5vw, 12px);
            margin: clamp(15px, 4vw, 30px) auto;
            background-color: rgba(0,0,0,0.4);
            padding: clamp(10px, 3vw, 20px);
            border-radius: 15px;
            width: fit-content;
            border: 1px solid rgba(255,255,255,0.1);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .game-grid.turn-player1 {
            box-shadow: 0 0 20px rgba(255, 42, 109, 0.4), 0 0 40px rgba(255, 42, 109, 0.2);
            border-color: rgba(255, 42, 109, 0.6);
        }

        .game-grid.turn-player2 {
            box-shadow: 0 0 20px rgba(5, 217, 232, 0.4), 0 0 40px rgba(5, 217, 232, 0.2);
            border-color: rgba(5, 217, 232, 0.6);
        }
        
        .cell {
            width: clamp(35px, 12vw, 65px);
            height: clamp(35px, 12vw, 65px);
            background-color: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: clamp(8px, 2vw, 12px);
            cursor: pointer;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2), 0 2px 5px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        
        .cell:hover {
            transform: translateY(-2px) scale(1.02);
            background-color: rgba(255,255,255,0.1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        
        .cell.player1 {
            border-color: #ff2a6d;
            box-shadow: inset 0 0 15px rgba(255,42,109,0.3);
        }
        
        .cell.player2 {
            border-color: #05d9e8;
            box-shadow: inset 0 0 15px rgba(5,217,232,0.3);
        }
        
        .dots-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        
        .dot {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #fff;
            box-shadow: 0 0 8px #fff;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .cell.player1 .dot {
            background-color: #ff2a6d;
            box-shadow: 0 0 8px #ff2a6d, 0 0 15px #ff2a6d;
        }
        
        .cell.player2 .dot {
            background-color: #05d9e8;
            box-shadow: 0 0 8px #05d9e8, 0 0 15px #05d9e8;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* Dynamic Dot positions */
        .dot-1 { top: 50%; left: 50%; margin-top: -8px; margin-left: -8px; }
        
        .dot-2-1 { top: 35%; left: 35%; margin-top: -8px; margin-left: -8px; }
        .dot-2-2 { top: 65%; left: 65%; margin-top: -8px; margin-left: -8px; }
        
        .dot-3-1 { top: 25%; left: 50%; margin-top: -8px; margin-left: -8px; }
        .dot-3-2 { top: 65%; left: 30%; margin-top: -8px; margin-left: -8px; }
        .dot-3-3 { top: 65%; left: 70%; margin-top: -8px; margin-left: -8px; }
        
        .dot-4-1 { top: 30%; left: 30%; margin-top: -8px; margin-left: -8px; }
        .dot-4-2 { top: 30%; left: 70%; margin-top: -8px; margin-left: -8px; }
        .dot-4-3 { top: 70%; left: 30%; margin-top: -8px; margin-left: -8px; }
        .dot-4-4 { top: 70%; left: 70%; margin-top: -8px; margin-left: -8px; }
        
        
        @keyframes explode {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.3); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        
        .exploding {
            animation: explode 0.3s ease-out;
        }
        
        /* Main Menu Styles */
        #main-menu {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: transparent; /* Uses body's space background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease, transform 0.5s ease;
            padding: 20px;
        }
        
        #main-menu.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }
        
        .menu-title {
            font-size: clamp(3.5rem, 12vw, 6rem);
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700, 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 140, 0, 0.8), 2px 2px 4px #000;
            margin-bottom: 20px;
            font-weight: 900;
            letter-spacing: 4px;
            font-family: serif; /* Gives a more cinematic look */
            text-align: center;
            border-top: 2px solid #ffd700;
            border-bottom: 2px solid #ffd700;
            padding: 10px 40px;
            margin-top: 10vh;
            box-shadow: 0 -10px 20px -10px rgba(255, 215, 0, 0.5), 0 10px 20px -10px rgba(255, 215, 0, 0.5);
        }

        .menu-buttons-container {
            position: absolute;
            bottom: 10%;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
        }
        
        .menu-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 12px 20px;
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 85%;
            max-width: 250px;
            backdrop-filter: blur(5px);
        }
        
        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), inset 0 0 10px rgba(255, 215, 0, 0.3);
            background: rgba(255, 215, 0, 0.1);
        }

        .back-btn {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            background: rgba(255, 215, 0, 0.1);
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Online Lobby */
        #online-lobby {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .lobby-title {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            margin-bottom: 30px;
            font-family: serif;
            letter-spacing: 2px;
        }

        .lobby-panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .lobby-panel input {
            background: rgba(0,0,0,0.6);
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 8px;
            width: 100%;
            max-width: 250px;
            outline: none;
            text-transform: uppercase;
            font-weight: bold;
            box-sizing: border-box;
        }

        .lobby-panel input::placeholder {
            letter-spacing: 2px;
            opacity: 0.5;
        }

        .room-code-display {
            font-size: clamp(2rem, 8vw, 3rem);
            color: #ffd700;
            letter-spacing: 10px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            margin: 20px 0;
            font-family: monospace;
        }

        .lobby-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            margin: 10px;
        }

        .lobby-btn:hover {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            background: rgba(255, 215, 0, 0.1);
        }

        .lobby-status {
            color: #aaa;
            margin-top: 15px;
            font-size: 1rem;
        }

        .lobby-error {
            color: #ff4444;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .waiting-text {
            animation: pulse 1.5s ease-in-out infinite;
            color: #ffd700;
        }

        /* Game status bar for online */
        .online-status {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 8px 15px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #ffd700;
        }

        .online-status.your-turn {
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .online-status.waiting-turn {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        /* Disconnect overlay */
        #disconnect-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 2000;
            color: #ffd700;
            font-size: 1.5rem;
            text-align: center;
            padding: 20px;
        }

        @media (min-width: 600px) {
            .menu-buttons-container {
                flex-direction: row;
            }
            .menu-btn {
                width: auto;
            }
        }
    </style>
    <script src="socket.io.min.js"></script>
</head>
<body>
    <div id="main-menu">
        <div class="menu-title">COLOR WARS</div>
        
        <div class="menu-buttons-container">
            <button class="menu-btn" onclick="startGame('PvP')">Player vs Player</button>
            <button class="menu-btn" onclick="startGame('PvC')">Player vs Computer</button>
            <button class="menu-btn" onclick="showOnlineLobby()">Play Online</button>
        </div>
    </div>

    <!-- Online Lobby -->
    <div id="online-lobby">
        <div class="lobby-title">ONLINE PLAY</div>
        <div class="lobby-panel">
            <div id="lobby-create-section">
                <button class="lobby-btn" onclick="createRoom()">Create Room</button>
                <div style="margin: 20px 0; color: #555;">— or —</div>
                <input type="text" id="join-code-input" placeholder="ENTER CODE" maxlength="6">
                <br>
                <button class="lobby-btn" style="margin-top: 15px;" onclick="joinRoom()">Join Room</button>
                <div id="lobby-error" class="lobby-error"></div>
            </div>
            <div id="lobby-waiting-section" style="display: none;">
                <p style="color: #aaa;">Share this code with a friend:</p>
                <div id="room-code-display" class="room-code-display"></div>
                <p class="waiting-text">Waiting for opponent...</p>
            </div>
        </div>
        <button class="back-btn" style="margin-top: 30px;" onclick="hideOnlineLobby()">← Back</button>
    </div>

    <!-- Disconnect Overlay -->
    <div id="disconnect-overlay">
        <div>💔 Opponent Disconnected</div>
        <div style="font-size: 1rem; color: #aaa; margin-top: 10px;">You win!</div>
        <button class="lobby-btn" style="margin-top: 20px;" onclick="backToMenuFromDisconnect()">Main Menu</button>
    </div>

    <div class="game-container" id="game-container">
        <div id="online-status-bar" class="online-status" style="display: none;"></div>

        <div class="score-board">
            <div id="player1" class="player player1 active-player">
                <div>Player 1</div>
            </div>
            <div id="player2" class="player player2">
                <div>Player 2</div>
            </div>
        </div>
        
        
        <div id="game-grid" class="game-grid"></div>
        <button class="back-btn" onclick="leaveGame()">← Main Menu</button>
    </div>
    
    <script>
        const gameGrid = document.getElementById('game-grid');
        const player1Element = document.getElementById('player1');
        const player2Element = document.getElementById('player2');
        const mainMenu = document.getElementById('main-menu');
        const gameContainer = document.getElementById('game-container');
        const onlineLobby = document.getElementById('online-lobby');
        const onlineStatusBar = document.getElementById('online-status-bar');
        const disconnectOverlay = document.getElementById('disconnect-overlay');
        
        let board = [];
        let currentPlayer = 1;
        let scores = { 1: 0, 2: 0 };
        let gridSize = 6;
        let turnCount = 0;
        let isProcessing = false;
        let gameMode = 'PvP';
        
        // Online state
        let socket = null;
        let myPlayerNumber = null;
        let currentRoomCode = null;
        
        function startGame(mode) {
            gameMode = mode;
            mainMenu.classList.add('hidden');
            gameContainer.style.display = 'block';
            onlineStatusBar.style.display = 'none';
            
            // Re-label player 2 if playing against computer
            if (mode === 'PvC') {
                player2Element.querySelector('div').innerText = "Computer";
            } else {
                player2Element.querySelector('div').innerText = "Player 2";
            }
            
            initGame();
        }

        function showMenu() {
            mainMenu.classList.remove('hidden');
            gameContainer.style.display = 'none';
            onlineStatusBar.style.display = 'none';
        }

        function leaveGame() {
            if (gameMode === 'online' && socket) {
                socket.disconnect();
                socket = null;
                currentRoomCode = null;
                myPlayerNumber = null;
            }
            showMenu();
        }

        // Backend URL — update this when deploying the backend to a remote server
        const BACKEND_URL = 'https://colorwars-second-project.onrender.com';

        // ── Online Lobby ──────────────────────────────────────────
        function showOnlineLobby() {
            mainMenu.classList.add('hidden');
            onlineLobby.style.display = 'flex';
            document.getElementById('lobby-create-section').style.display = 'block';
            document.getElementById('lobby-waiting-section').style.display = 'none';
            document.getElementById('lobby-error').textContent = '';
            document.getElementById('join-code-input').value = '';

            // Connect socket
            try {
                if (!socket) {
                    if (typeof io !== 'undefined') {
                        socket = io(BACKEND_URL);
                        setupSocketListeners();
                    } else {
                        document.getElementById('lobby-error').textContent = 'Network error: Multiplayer script failed to load. Please disable ad-blockers or refresh.';
                    }
                }
            } catch (err) {
                console.error("Socket connection error:", err);
                document.getElementById('lobby-error').textContent = 'Failed to connect to server.';
            }
        }

        function hideOnlineLobby() {
            onlineLobby.style.display = 'none';
            mainMenu.classList.remove('hidden');
            if (socket && !currentRoomCode) {
                socket.disconnect();
                socket = null;
            }
        }

        function createRoom() {
            document.getElementById('lobby-error').textContent = '';
            if (!socket) {
                document.getElementById('lobby-error').textContent = 'Not connected to server. Please try again or refresh the page.';
                return;
            }
            socket.emit('create-room', (response) => {
                if (response.success) {
                    currentRoomCode = response.code;
                    myPlayerNumber = response.playerNumber;
                    document.getElementById('lobby-create-section').style.display = 'none';
                    document.getElementById('lobby-waiting-section').style.display = 'block';
                    document.getElementById('room-code-display').textContent = response.code;
                } else {
                    document.getElementById('lobby-error').textContent = response.error;
                }
            });
        }

        function joinRoom() {
            const code = document.getElementById('join-code-input').value.trim();
            if (code.length !== 6) {
                document.getElementById('lobby-error').textContent = 'Code must be 6 characters';
                return;
            }
            document.getElementById('lobby-error').textContent = '';
            if (!socket) {
                document.getElementById('lobby-error').textContent = 'Not connected to server. Please try again or refresh the page.';
                return;
            }
            socket.emit('join-room', code, (response) => {
                if (response.success) {
                    currentRoomCode = response.code;
                    myPlayerNumber = response.playerNumber;
                    // game-start event will handle the transition
                } else {
                    document.getElementById('lobby-error').textContent = response.error;
                }
            });
        }

        function setupSocketListeners() {
            socket.on('game-start', (data) => {
                onlineLobby.style.display = 'none';
                gameMode = 'online';

                player1Element.querySelector('div').innerText = myPlayerNumber === 1 ? 'You (P1)' : 'Opponent (P1)';
                player2Element.querySelector('div').innerText = myPlayerNumber === 2 ? 'You (P2)' : 'Opponent (P2)';

                gameContainer.style.display = 'block';
                onlineStatusBar.style.display = 'block';

                board = data.board;
                currentPlayer = data.currentPlayer;
                scores = data.scores;
                turnCount = data.turnCount;
                isProcessing = false;

                createGrid();
                updateUI();
                updateOnlineStatus();
            });

            socket.on('move-made', async (data) => {
                isProcessing = true;
                board = data.board;
                scores = data.scores;
                currentPlayer = data.currentPlayer;
                turnCount = data.turnCount;

                // Animate explosion steps
                if (data.explosionSteps && data.explosionSteps.length > 0) {
                    for (const step of data.explosionSteps) {
                        // Highlight exploding cells
                        for (const ec of step.explodedCells) {
                            const cellEl = document.getElementById(`cell-${ec.row}-${ec.col}`);
                            if (cellEl) {
                                cellEl.classList.add('exploding');
                                setTimeout(() => cellEl.classList.remove('exploding'), 300);
                            }
                        }
                        // Apply snapshot for this step
                        board = step.boardSnapshot;
                        updateUI();
                        await new Promise(res => setTimeout(res, 300));
                    }
                }

                // Final state
                board = data.board;
                updateUI();
                updateOnlineStatus();
                isProcessing = false;

                if (data.winner) {
                    const winMsg = data.winner === myPlayerNumber ? 'You Win! 🎉' : 'You Lose 😞';
                    setTimeout(() => alert(winMsg), 200);
                }
            });

            socket.on('opponent-disconnected', (data) => {
                disconnectOverlay.style.display = 'flex';
            });
        }

        function updateOnlineStatus() {
            if (gameMode !== 'online') return;
            const isMyTurn = currentPlayer === myPlayerNumber;
            onlineStatusBar.textContent = isMyTurn ? 'Your Turn' : 'Opponent\'s Turn';
            onlineStatusBar.className = 'online-status ' + (isMyTurn ? 'your-turn' : 'waiting-turn');
        }

        function backToMenuFromDisconnect() {
            disconnectOverlay.style.display = 'none';
            if (socket) {
                socket.disconnect();
                socket = null;
            }
            currentRoomCode = null;
            myPlayerNumber = null;
            showMenu();
        }
        
        function initGame() {
            board = [];
            scores = { 1: 0, 2: 0 };
            currentPlayer = 1;
            turnCount = 0;
            isProcessing = false;
            
            for (let row = 0; row < gridSize; row++) {
                let rowArray = [];
                for (let col = 0; col < gridSize; col++) {
                    rowArray.push({ owner: 0, dots: 0 });
                }
                board.push(rowArray);
            }
            
            createGrid();
            updateUI();
        }
        
        function createGrid() {
            gameGrid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            gameGrid.innerHTML = '';
            
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${row}-${col}`;
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    cell.addEventListener('click', () => {
                        handleCellClick(row, col);
                    });
                    
                    gameGrid.appendChild(cell);
                }
            }
        }
        

        
        async function handleCellClick(row, col) {
            if (isProcessing) return;

            // ── Online Mode: send move to server ──
            if (gameMode === 'online') {
                if (currentPlayer !== myPlayerNumber) return; // not your turn
                const cell = board[row][col];
                if (cell.owner !== 0 && cell.owner !== myPlayerNumber) return;

                isProcessing = true;
                socket.emit('make-move', { code: currentRoomCode, row, col }, (response) => {
                    if (!response.valid) {
                        isProcessing = false;
                    }
                    // move-made event will handle the rest
                });
                return;
            }

            // ── Local Mode (PvP / PvC) ──
            const cell = board[row][col];
            
            if (cell.owner === 0 || cell.owner === currentPlayer) {
                isProcessing = true;
                
                if (cell.owner === 0) {
                    cell.owner = currentPlayer;
                    scores[currentPlayer]++;
                }
                cell.dots++;
                turnCount++;
                
                updateUI();
                
                let explosions = [{row, col}];
                
                while (explosions.length > 0) {
                    let nextExplosions = [];
                    let explodedThisRound = false;
                    
                    const uniqueExplosions = [];
                    const seen = new Set();
                    for (let e of explosions) {
                        const key = `${e.row},${e.col}`;
                        if (!seen.has(key)) {
                            seen.add(key);
                            uniqueExplosions.push(e);
                        }
                    }
                    
                    for (let {row: r, col: c} of uniqueExplosions) {
                        const cellData = board[r][c];
                        const threshold = 4;
                        
                        while (cellData.dots >= threshold) {
                            explodedThisRound = true;
                            const cellEl = document.getElementById(`cell-${r}-${c}`);
                            if(cellEl) {
                                cellEl.classList.add('exploding');
                                setTimeout(() => cellEl.classList.remove('exploding'), 300);
                            }
                            
                            cellData.dots -= threshold;
                            if (cellData.dots === 0) {
                                cellData.owner = 0;
                                scores[currentPlayer]--;
                            }
                            
                            const directions = [[-1, 0], [0, 1], [1, 0], [0, -1]];
                            for (const [dx, dy] of directions) {
                                const nr = r + dx;
                                const nc = c + dy;
                                
                                if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                                    const neighbor = board[nr][nc];
                                    
                                    if (neighbor.owner === 0) {
                                        neighbor.owner = currentPlayer;
                                        scores[currentPlayer]++;
                                    } else if (neighbor.owner !== currentPlayer) {
                                        scores[neighbor.owner]--;
                                        scores[currentPlayer]++;
                                        neighbor.owner = currentPlayer;
                                    }
                                    
                                    neighbor.dots++;
                                    if (neighbor.dots >= 4) {
                                        nextExplosions.push({row: nr, col: nc});
                                    }
                                }
                            }
                        }
                    }
                    
                    if (explodedThisRound) {
                        updateUI();
                        await new Promise(res => setTimeout(res, 300));
                        
                        if (checkWinCondition()) {
                            isProcessing = false;
                            return;
                        }
                    }
                    
                    explosions = nextExplosions;
                }
                
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                updateUI();
                isProcessing = false;
                
                if (gameMode === 'PvC' && currentPlayer === 2 && !checkWinCondition()) {
                    setTimeout(makeComputerMove, 300);
                }
            }
        }
        
        function checkWinCondition() {
            if (turnCount > 1) {
                if (scores[1] === 0) {
                    setTimeout(() => alert("Player 2 Wins the War!"), 100);
                    return true;
                }
                if (scores[2] === 0) {
                    setTimeout(() => alert("Player 1 Wins the War!"), 100);
                    return true;
                }
            }
            return false;
        }
        
        function updateUI() {
            player1Element.classList.toggle('active-player', currentPlayer === 1);
            player2Element.classList.toggle('active-player', currentPlayer === 2);
            
            gameGrid.classList.remove('turn-player1', 'turn-player2');
            gameGrid.classList.add(currentPlayer === 1 ? 'turn-player1' : 'turn-player2');
            
            
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const cell = document.getElementById(`cell-${row}-${col}`);
                    const cellData = board[row][col];
                    
                    // keep exploding class if present
                    const isExploding = cell.classList.contains('exploding');
                    cell.className = 'cell';
                    if (isExploding) cell.classList.add('exploding');
                    
                    if (cellData.owner === 1) cell.classList.add('player1');
                    if (cellData.owner === 2) cell.classList.add('player2');
                    
                    cell.innerHTML = '';
                    if (cellData.dots > 0) {
                        const dotsContainer = document.createElement('div');
                        dotsContainer.className = 'dots-container';
                        
                        const dotsToRender = Math.min(cellData.dots, 4);
                        
                        for (let i = 1; i <= dotsToRender; i++) {
                            const dot = document.createElement('div');
                            dot.className = 'dot';
                            
                            if (dotsToRender === 1) dot.classList.add('dot-1');
                            else if (dotsToRender === 2) dot.classList.add(`dot-2-${i}`);
                            else if (dotsToRender === 3) dot.classList.add(`dot-3-${i}`);
                            else if (dotsToRender === 4) dot.classList.add(`dot-4-${i}`);
                            
                            dotsContainer.appendChild(dot);
                        }
                        cell.appendChild(dotsContainer);
                    }
                }
            }
        }
        
        
        // --- AI LOGIC ---
        function cloneBoard(b) {
            return b.map(row => row.map(cell => ({owner: cell.owner, dots: cell.dots})));
        }

        function getLegalMoves(b, player) {
            let moves = [];
            for (let r=0; r<gridSize; r++){
                for (let c=0; c<gridSize; c++){
                    if (b[r][c].owner === 0 || b[r][c].owner === player) {
                        moves.push({row: r, col: c});
                    }
                }
            }
            return moves;
        }

        function simulateMoveJS(b, r, c, player) {
            b[r][c].owner = player;
            b[r][c].dots++;
            
            let explosions = [{row: r, col: c}];
            while (explosions.length > 0) {
                let nextExplosions = [];
                const uniqueExplosions = [];
                const seen = new Set();
                for (let e of explosions) {
                    const key = `${e.row},${e.col}`;
                    if (!seen.has(key)) {
                        seen.add(key);
                        uniqueExplosions.push(e);
                    }
                }
                
                for (let {row: cr, col: cc} of uniqueExplosions) {
                    const cellData = b[cr][cc];
                    while (cellData.dots >= 4) {
                        cellData.dots -= 4;
                        if (cellData.dots === 0) cellData.owner = 0;
                        
                        const directions = [[-1, 0], [0, 1], [1, 0], [0, -1]];
                        for (const [dx, dy] of directions) {
                            const nr = cr + dx;
                            const nc = cc + dy;
                            if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                                b[nr][nc].owner = player;
                                b[nr][nc].dots++;
                                if (b[nr][nc].dots >= 4) {
                                    nextExplosions.push({row: nr, col: nc});
                                }
                            }
                        }
                    }
                }
                explosions = nextExplosions;
            }
            return b;
        }

        function evaluateBoard(b) {
            let p1Dots = 0, p2Dots = 0;
            for (let r=0; r<gridSize; r++){
                for (let c=0; c<gridSize; c++){
                    if (b[r][c].owner === 1) p1Dots += b[r][c].dots;
                    if (b[r][c].owner === 2) p2Dots += b[r][c].dots;
                }
            }
            
            if (p1Dots + p2Dots > 1) {
                if (p1Dots === 0) return 100000;
                if (p2Dots === 0) return -100000;
            }
            
            let score = 0;
            score += p2Dots * 10;
            score -= p1Dots * 10;
            
            for (let r=0; r<gridSize; r++){
                for (let c=0; c<gridSize; c++){
                    const cell = b[r][c];
                    if (cell.dots === 3) {
                        if (cell.owner === 2) score += 15;
                        if (cell.owner === 1) score -= 15;
                        
                        const directions = [[-1, 0], [0, 1], [1, 0], [0, -1]];
                        for (const [dx, dy] of directions) {
                            const nr = r + dx;
                            const nc = c + dy;
                            if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                                const neighbor = b[nr][nc];
                                if (neighbor.dots === 3 && neighbor.owner !== cell.owner && neighbor.owner !== 0) {
                                    if (cell.owner === 2) score -= 30; // very vulnerable
                                    if (cell.owner === 1) score += 30; // enemy is vulnerable
                                }
                            }
                        }
                    }
                }
            }
            return score;
        }

        function minimax(b, depth, alpha, beta, isMaximizing) {
            const score = evaluateBoard(b);
            if (depth === 0 || Math.abs(score) >= 90000) return score;
            
            if (isMaximizing) {
                let maxEval = -Infinity;
                const moves = getLegalMoves(b, 2);
                for (let move of moves) {
                    let nextBoard = simulateMoveJS(cloneBoard(b), move.row, move.col, 2);
                    let ev = minimax(nextBoard, depth - 1, alpha, beta, false);
                    maxEval = Math.max(maxEval, ev);
                    alpha = Math.max(alpha, ev);
                    if (beta <= alpha) break;
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                const moves = getLegalMoves(b, 1);
                for (let move of moves) {
                    let nextBoard = simulateMoveJS(cloneBoard(b), move.row, move.col, 1);
                    let ev = minimax(nextBoard, depth - 1, alpha, beta, true);
                    minEval = Math.min(minEval, ev);
                    beta = Math.min(beta, ev);
                    if (beta <= alpha) break;
                }
                return minEval;
            }
        }

        function makeComputerMove() {
            if (isProcessing || checkWinCondition() || currentPlayer !== 2) return;
            
            const moves = getLegalMoves(board, 2);
            if (moves.length === 0) return;
            
            moves.sort(() => Math.random() - 0.5);
            
            let bestScore = -Infinity;
            let bestMove = moves[0];
            
            // Depth 2 search
            for (let move of moves) {
                let nextBoard = simulateMoveJS(cloneBoard(board), move.row, move.col, 2);
                let score = minimax(nextBoard, 1, -Infinity, Infinity, false);
                if (score > bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            }
            
            handleCellClick(bestMove.row, bestMove.col);
        }

        // We don't automatically initGame anymore, we wait for menu selection.
    </script>
