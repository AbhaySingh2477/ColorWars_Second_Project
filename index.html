<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Wars - Dynamic</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💥</text></svg>">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .game-container {
            max-width: 600px;
            text-align: center;
            background: rgba(255, 255, 255, 0.5);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        
        h1 {
            color: #4a4e69;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        
        .player {
            padding: 15px 25px;
            border-radius: 15px;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .player1 {
            background-color: #ffb6b9;
            color: #333;
        }
        
        .player2 {
            background-color: #b5c7f9;
            color: #333;
        }
        
        .active-player {
            border: 3px solid #4a4e69;
            transform: scale(1.1);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        .game-grid {
            display: grid;
            gap: 12px;
            margin: 30px auto;
            background-color: rgba(255,255,255,0.4);
            padding: 20px;
            border-radius: 15px;
            width: fit-content;
        }
        
        .cell {
            width: 65px;
            height: 65px;
            background-color: #fff;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05), 0 2px 5px rgba(0,0,0,0.1);
            transition: background-color 0.4s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .cell:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        
        .cell.player1 {
            background-color: #ffb6b9;
        }
        
        .cell.player2 {
            background-color: #b5c7f9;
        }
        
        .dots-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        
        .dot {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #ffffff;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* Dynamic Dot positions */
        .dot-1 { top: 50%; left: 50%; margin-top: -8px; margin-left: -8px; }
        
        .dot-2-1 { top: 35%; left: 35%; margin-top: -8px; margin-left: -8px; }
        .dot-2-2 { top: 65%; left: 65%; margin-top: -8px; margin-left: -8px; }
        
        .dot-3-1 { top: 25%; left: 50%; margin-top: -8px; margin-left: -8px; }
        .dot-3-2 { top: 65%; left: 30%; margin-top: -8px; margin-left: -8px; }
        .dot-3-3 { top: 65%; left: 70%; margin-top: -8px; margin-left: -8px; }
        
        .dot-4-1 { top: 30%; left: 30%; margin-top: -8px; margin-left: -8px; }
        .dot-4-2 { top: 30%; left: 70%; margin-top: -8px; margin-left: -8px; }
        .dot-4-3 { top: 70%; left: 30%; margin-top: -8px; margin-left: -8px; }
        .dot-4-4 { top: 70%; left: 70%; margin-top: -8px; margin-left: -8px; }
        
        
        @keyframes explode {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.3); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        
        .exploding {
            animation: explode 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="game-container">
        
        <div class="score-board">
            <div id="player1" class="player player1 active-player">
                <div>Player 1</div>
            </div>
            <div id="player2" class="player player2">
                <div>Player 2</div>
            </div>
        </div>
        
        
        <div id="game-grid" class="game-grid"></div>
    </div>
    
    <script>
        const gameGrid = document.getElementById('game-grid');
        const player1Element = document.getElementById('player1');
        const player2Element = document.getElementById('player2');
        
        let board = [];
        let currentPlayer = 1;
        let scores = { 1: 0, 2: 0 };
        let gridSize = 6;
        let turnCount = 0;
        let isProcessing = false;
        
        function initGame() {
            board = [];
            scores = { 1: 0, 2: 0 };
            currentPlayer = 1;
            turnCount = 0;
            isProcessing = false;
            
            for (let row = 0; row < gridSize; row++) {
                let rowArray = [];
                for (let col = 0; col < gridSize; col++) {
                    rowArray.push({ owner: 0, dots: 0 });
                }
                board.push(rowArray);
            }
            
            createGrid();
            updateUI();
        }
        
        function createGrid() {
            gameGrid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            gameGrid.innerHTML = '';
            
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${row}-${col}`;
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    cell.addEventListener('click', () => {
                        handleCellClick(row, col);
                    });
                    
                    gameGrid.appendChild(cell);
                }
            }
        }
        

        
        async function handleCellClick(row, col) {
            if (isProcessing) return;
            const cell = board[row][col];
            
            if (cell.owner === 0 || cell.owner === currentPlayer) {
                isProcessing = true;
                
                if (cell.owner === 0) {
                    cell.owner = currentPlayer;
                    scores[currentPlayer]++;
                }
                cell.dots++;
                turnCount++;
                
                updateUI();
                
                let explosions = [{row, col}];
                
                while (explosions.length > 0) {
                    let nextExplosions = [];
                    let explodedThisRound = false;
                    
                    // Deduplicate explosions to avoid processing the same cell multiple times in one tick
                    const uniqueExplosions = [];
                    const seen = new Set();
                    for (let e of explosions) {
                        const key = `${e.row},${e.col}`;
                        if (!seen.has(key)) {
                            seen.add(key);
                            uniqueExplosions.push(e);
                        }
                    }
                    
                    for (let {row: r, col: c} of uniqueExplosions) {
                        const cellData = board[r][c];
                        const threshold = 4;
                        
                        // Use while loop here instead of if, in case a cell received enough dots to explode multiple times
                        while (cellData.dots >= threshold) {
                            explodedThisRound = true;
                            // Add exploding class
                            const cellEl = document.getElementById(`cell-${r}-${c}`);
                            if(cellEl) {
                                cellEl.classList.add('exploding');
                                setTimeout(() => cellEl.classList.remove('exploding'), 300);
                            }
                            
                            cellData.dots -= threshold;
                            if (cellData.dots === 0) {
                                cellData.owner = 0;
                                scores[currentPlayer]--;
                            }
                            
                            const directions = [[-1, 0], [0, 1], [1, 0], [0, -1]];
                            for (const [dx, dy] of directions) {
                                const nr = r + dx;
                                const nc = c + dy;
                                
                                if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                                    const neighbor = board[nr][nc];
                                    
                                    if (neighbor.owner === 0) {
                                        neighbor.owner = currentPlayer;
                                        scores[currentPlayer]++;
                                    } else if (neighbor.owner !== currentPlayer) {
                                        scores[neighbor.owner]--;
                                        scores[currentPlayer]++;
                                        neighbor.owner = currentPlayer;
                                    }
                                    
                                    neighbor.dots++;
                                    if (neighbor.dots >= 4) {
                                        nextExplosions.push({row: nr, col: nc});
                                    }
                                }
                            }
                        }
                    }
                    
                    if (explodedThisRound) {
                        updateUI();
                        await new Promise(res => setTimeout(res, 300));
                        
                        if (checkWinCondition()) {
                            isProcessing = false;
                            return;
                        }
                    }
                    
                    explosions = nextExplosions;
                }
                
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                updateUI();
                isProcessing = false;
            }
        }
        
        function checkWinCondition() {
            if (turnCount > 1) {
                if (scores[1] === 0) {
                    setTimeout(() => alert("Player 2 Wins the War!"), 100);
                    return true;
                }
                if (scores[2] === 0) {
                    setTimeout(() => alert("Player 1 Wins the War!"), 100);
                    return true;
                }
            }
            return false;
        }
        
        function updateUI() {
            player1Element.classList.toggle('active-player', currentPlayer === 1);
            player2Element.classList.toggle('active-player', currentPlayer === 2);
            
            
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const cell = document.getElementById(`cell-${row}-${col}`);
                    const cellData = board[row][col];
                    
                    // keep exploding class if present
                    const isExploding = cell.classList.contains('exploding');
                    cell.className = 'cell';
                    if (isExploding) cell.classList.add('exploding');
                    
                    if (cellData.owner === 1) cell.classList.add('player1');
                    if (cellData.owner === 2) cell.classList.add('player2');
                    
                    cell.innerHTML = '';
                    if (cellData.dots > 0) {
                        const dotsContainer = document.createElement('div');
                        dotsContainer.className = 'dots-container';
                        
                        const dotsToRender = Math.min(cellData.dots, 4);
                        
                        for (let i = 1; i <= dotsToRender; i++) {
                            const dot = document.createElement('div');
                            dot.className = 'dot';
                            
                            if (dotsToRender === 1) dot.classList.add('dot-1');
                            else if (dotsToRender === 2) dot.classList.add(`dot-2-${i}`);
                            else if (dotsToRender === 3) dot.classList.add(`dot-3-${i}`);
                            else if (dotsToRender === 4) dot.classList.add(`dot-4-${i}`);
                            
                            dotsContainer.appendChild(dot);
                        }
                        cell.appendChild(dotsContainer);
                    }
                }
            }
        }
        
        
        initGame();
    </script>
</body>
</html>
